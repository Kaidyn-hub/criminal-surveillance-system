<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Criminal Surveillance System</title>

  <link rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

  <header>
    Criminal Surveillance System Dashboard
  </header>

  <div class="container">

    <!-- ================================= -->
    <!-- LIVE VIDEO SECTION -->
    <!-- ================================= -->
    <div class="video-section">

      <div class="video-header">

        <h2 class="video-title">
          Live Camera Feed
        </h2>

        <div id="clock" class="clock">
          ----
        </div>

      </div>

      <img
        src="{{ url_for('stream') }}"
        class="video-feed"
        alt="Live Feed"
      >

      <div class="alert-box" id="alertBox">
        ⚠️ Alert Detected!
      </div>

      <div class="status" id="statusBox">
        ✅ System Running Normally
      </div>

    </div>

    <div class="info-section">

      <div class="metrics-panel">

        <h2>System Metrics</h2>

        <div class="metric-box">
          <span>Status</span>
          <h3 id="metricStatus">NORMAL</h3>
        </div>

        <div class="metric-box">
          <span>FPS</span>
          <h3 id="fps">0</h3>
        </div>

        <div class="metric-box">
          <span>Latency</span>
          <h3 id="latency">0 ms</h3>
        </div>

        <div class="metric-box">
          <span>Accuracy</span>
          <h3 id="accuracy">0%</h3>
        </div>

      </div>

      <h2>Detection Logs</h2>

      <table>

        <thead>
          <tr>
            <th>#</th>
            <th>Type</th>
            <th>Confidence</th>
            <th>Timestamp</th>
          </tr>
        </thead>

        <tbody id="logTable">
        </tbody>

      </table>

    </div>

  </div>

<script>

  function updateClock(){

      const now = new Date();

      document.getElementById("clock").innerText =
        now.toLocaleTimeString();

    }

    setInterval(updateClock, 1000);

    async function updateMetrics(){

      try{

        const response =
          await fetch('/api/status');

        const data =
          await response.json();

        document.getElementById(
          'metricStatus'
        ).innerText = data.status;

        document.getElementById(
          'fps'
        ).innerText = data.fps;

        document.getElementById(
          'latency'
        ).innerText =
          data.latency_ms + " ms";

        document.getElementById(
          'accuracy'
        ).innerText =
          data.accuracy + "%";

        document.getElementById(
          'precision'
        ).innerText =
          data.precision + "%";

        document.getElementById(
          'recall'
        ).innerText =
          data.recall + "%";

        document.getElementById(
          'f1'
        ).innerText =
          data.f1_score + "%";

      }

      catch(err){

        console.log(err);

      }

    }

    setInterval(updateMetrics, 500);

    async function updateLogs(){

      try{

        const response =
          await fetch('/api/logs');

        const logs =
          await response.json();

        const table =
          document.getElementById(
            'logTable'
          );

        table.innerHTML = "";

        logs.forEach((log, index) => {

          table.innerHTML += `
            <tr>
              <td>${index + 1}</td>
              <td>${log.type}</td>
              <td>${log.confidence}</td>
              <td>${log.timestamp}</td>
            </tr>
          `;

        });

      }

      catch(err){

        console.log(err);

      }

    }

    setInterval(updateLogs, 1000);

  </script>

</body>
</html>
